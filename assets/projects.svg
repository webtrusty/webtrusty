<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#09152C"/>
</linearGradient>

<linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#111827"/>
<stop offset="100%" stop-color="#0B1220"/>
</linearGradient>

<linearGradient id="blue" x1="0%" y1="0%" x2="100%">
<stop offset="0%" stop-color="#2563EB"/>
<stop offset="100%" stop-color="#60A5FA"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="70"/>
</filter>

</defs>

<rect width="1600" height="900" fill="url(#bg)"/>

<!-- Background Glow -->

<circle cx="250" cy="180" r="180" fill="#2563EB22" filter="url(#blur)">
<animate attributeName="r" values="180;220;180" dur="9s" repeatCount="indefinite"/>
</circle>

<circle cx="1350" cy="700" r="220" fill="#60A5FA18" filter="url(#blur)">
<animate attributeName="r" values="220;260;220" dur="11s" repeatCount="indefinite"/>
</circle>

