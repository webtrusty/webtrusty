<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="170" viewBox="0 0 1600 170">

  <defs>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB00"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB00"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

  </defs>

  <!-- Glow -->

  <circle cx="800" cy="82" r="85"
          fill="#2563EB22"
          filter="url(#blur)">

    <animate
      attributeName="r"
      values="85;98;85"
      dur="4s"
      repeatCount="indefinite"/>

  </circle>

  <!-- Left Line -->

  <line
    x1="120"
    y1="82"
    x2="600"
    y2="82"
    stroke="url(#line)"
    stroke-width="2"/>

  <!-- Right Line -->

  <line
    x1="1000"
    y1="82"
    x2="1480"
    y2="82"
    stroke="url(#line)"
    stroke-width="2"/>

  <!-- Animated Hexagon -->

  <polygon
    points="800,58 820,70 820,94 800,106 780,94 780,70"
    fill="url(#accent)">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 800 82"
      to="360 800 82"
      dur="10s"
      repeatCount="indefinite"/>

  </polygon>

  <!-- Small Orbit Ring -->

  <circle
    cx="800"
    cy="82"
    r="32"
    fill="none"
    stroke="#3B82F655"
    stroke-width="1.5">

    <animate
      attributeName="r"
      values="32;38;32"
      dur="3s"
      repeatCount="indefinite"/>

    <animate
      attributeName="stroke-opacity"
      values=".5;.15;.5"
      dur="3s"
      repeatCount="indefinite"/>

  </circle>

  <!-- Small Label -->

  <text
    x="800"
    y="42"
    text-anchor="middle"
    font-family="Inter,Arial"
    font-size="15"
    font-weight="700"
    letter-spacing="6"
    fill="#60A5FA">

    TECH STACK

  </text>

  <!-- Main Title -->

  <text
    x="800"
    y="132"
    text-anchor="middle"
    font-family="Inter,Arial"
    font-size="42"
    font-weight="800"
    fill="#FFFFFF">

    TECHNOLOGIES

  </text>

  <!-- Animated Scan -->

  <rect
    x="-220"
    y="79"
    width="170"
    height="6"
    fill="url(#accent)"
    opacity=".18">

    <animate
      attributeName="x"
      values="-220;1750"
      dur="5s"
      repeatCount="indefinite"/>

  </rect>

  <!-- Floating Particles -->

  <circle cx="710" cy="46" r="2" fill="#60A5FA">

    <animate
      attributeName="cy"
      values="46;36;46"
      dur="3s"
      repeatCount="indefinite"/>

  </circle>

  <circle cx="895" cy="118" r="2" fill="#60A5FA">

    <animate
      attributeName="cy"
      values="118;108;118"
      dur="4s"
      repeatCount="indefinite"/>

  </circle>

  <circle cx="950" cy="55" r="1.8" fill="#3B82F6">

    <animate
      attributeName="cy"
      values="55;45;55"
      dur="5s"
      repeatCount="indefinite"/>

  </circle>

</svg>
