<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="180" viewBox="0 0 1600 180">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0B1835"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F600"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F600"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path
        d="M40 0H0V40"
        fill="none"
        stroke="#1E3A8A"
        stroke-opacity=".08"/>
    </pattern>

  </defs>

  <!-- Background -->

  <rect width="1600" height="180" rx="20" fill="url(#bg)"/>
  <rect width="1600" height="180" fill="url(#grid)"/>

  <!-- Animated Scan -->

  <rect
      x="-260"
      y="0"
      width="180"
      height="180"
      fill="#3B82F610"
      transform="skewX(-25)">

      <animate
          attributeName="x"
          values="-260;1750"
          dur="8s"
          repeatCount="indefinite"/>

  </rect>

  <!-- Main Lines -->

  <line x1="120" y1="45" x2="1480" y2="45"
        stroke="url(#line)"
        stroke-width="2"/>

  <line x1="120" y1="135" x2="1480" y2="135"
        stroke="url(#line)"
        stroke-width="2"/>

  <!-- Network Connections -->

  <line x1="260" y1="90" x2="430" y2="90"
        stroke="#3B82F6"
        stroke-opacity=".45"/>

  <line x1="1170" y1="90" x2="1340" y2="90"
        stroke="#3B82F6"
        stroke-opacity=".45"/>

  <!-- Left Nodes -->

  <circle cx="230" cy="90" r="6" fill="#60A5FA">
    <animate attributeName="r"
             values="6;9;6"
             dur="2.4s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="300" cy="90" r="4" fill="#3B82F6">
    <animate attributeName="opacity"
             values=".3;1;.3"
             dur="3s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="380" cy="90" r="5" fill="#60A5FA">
    <animate attributeName="r"
             values="5;7;5"
             dur="2.8s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Right Nodes -->

  <circle cx="1370" cy="90" r="6" fill="#60A5FA">
    <animate attributeName="r"
             values="6;9;6"
             dur="2.6s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="1300" cy="90" r="4" fill="#3B82F6">
    <animate attributeName="opacity"
             values="1;.3;1"
             dur="3.2s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="1220" cy="90" r="5" fill="#60A5FA">
    <animate attributeName="r"
             values="5;7;5"
             dur="2.5s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Title -->

  <text
      x="800"
      y="82"
      text-anchor="middle"
      font-family="Arial"
      font-size="38"
      font-weight="700"
      fill="#FFFFFF">

      TECH STACK

  </text>

  <!-- Subtitle -->

  <text
      x="800"
      y="114"
      text-anchor="middle"
      font-family="Arial"
      font-size="16"
      fill="#60A5FA">

      Languages • Frameworks • Tools • AI

  </text>

</svg>
