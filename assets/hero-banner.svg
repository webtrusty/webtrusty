<svg xmlns="http://www.w3.org/2000/svg"
width="1600"
height="700"
viewBox="0 0 1600 700">

<defs>

<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#050816">
<animate attributeName="stop-color"
values="#050816;#071224;#050816"
dur="12s"
repeatCount="indefinite"/>

</stop>

<stop offset="100%" stop-color="#091A36">

<animate attributeName="stop-color"
values="#091A36;#0D2045;#091A36"
dur="12s"
repeatCount="indefinite"/>

</stop>

</linearGradient>

<linearGradient id="border">

<stop offset="0%"
stop-color="#2563EB"/>

<stop offset="100%"
stop-color="#60A5FA"/>

</linearGradient>

<linearGradient id="scan">

<stop offset="0%"
stop-color="#FFFFFF00"/>

<stop offset="50%"
stop-color="#60A5FA22"/>

<stop offset="100%"
stop-color="#FFFFFF00"/>

</linearGradient>

<filter id="blur">

<feGaussianBlur stdDeviation="60"/>

</filter>

<pattern
id="grid"
width="40"
height="40"
patternUnits="userSpaceOnUse">

<path
d="M40 0H0V40"
fill="none"
stroke="#1E3A8A"
stroke-opacity=".08"/>

</pattern>

</defs>

<!-- Background -->

<rect
width="1600"
height="700"
fill="url(#bg)"/>

<rect
width="1600"
height="700"
fill="url(#grid)"/>

<!-- Aurora -->

<circle
cx="260"
cy="140"
r="220"
fill="#2563EB22"
filter="url(#blur)">

<animate
attributeName="cx"
values="260;340;260"
dur="14s"
repeatCount="indefinite"/>

</circle>

<circle
cx="1360"
cy="560"
r="260"
fill="#60A5FA18"
filter="url(#blur)">

<animate
attributeName="cy"
values="560;500;560"
dur="16s"
repeatCount="indefinite"/>

</circle>

<!-- Main Glass -->

<rect
x="80"
y="70"
width="1440"
height="560"
rx="34"
fill="#081120AA"
stroke="url(#border)"
stroke-opacity=".45"
stroke-width="2"/>

<!-- Scan -->

<rect
x="-350"
y="70"
width="220"
height="560"
fill="url(#scan)"
transform="skewX(-25)">

<animate
attributeName="x"
values="-350;1750"
dur="8s"
repeatCount="indefinite"/>

</rect>

<!-- Divider -->

<line
x1="130"
y1="160"
x2="1470"
y2="160"
stroke="#2563EB55"/>
