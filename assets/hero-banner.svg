height="4"
rx="2"
fill="#3B82F6"/>

<!-- Role -->

<text
x="180"
y="330"
font-family="Inter,Arial"
font-size="30"
font-weight="600"
fill="#E2E8F0">

Frontend-Focused Full Stack Developer

</text>

