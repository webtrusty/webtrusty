<svg xmlns="http://www.w3.org/2000/svg"
width="1600"
height="900"
viewBox="0 0 1600 900">

<defs>

<pattern
id="grid"
width="40"
height="40"
patternUnits="userSpaceOnUse">

<path
d="M40 0H0V40"
fill="none"
stroke="#1e3a8a"
stroke-opacity=".12"
stroke-width="1"/>

</pattern>

<radialGradient id="glow">

<stop offset="0%" stop-color="#3b82f6" stop-opacity=".25"/>

<stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>

</radialGradient>

</defs>

<rect width="1600" height="900" fill="#050816"/>

<rect width="1600" height="900" fill="url(#grid)"/>

<circle cx="300" cy="250" r="180" fill="url(#glow)">
<animate
attributeName="cx"
values="300;420;300"
dur="12s"
repeatCount="indefinite"/>
</circle>

<circle cx="1200" cy="650" r="240" fill="url(#glow)">
<animate
attributeName="cy"
values="650;580;650"
dur="14s"
repeatCount="indefinite"/>
</circle>

</svg>
