<svg xmlns="http://www.w3.org/2000/svg"
width="1600"
height="900"
viewBox="0 0 1600 900">

<defs>

<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#08142C"/>

</linearGradient>

<pattern
id="grid"
width="40"
height="40"
patternUnits="userSpaceOnUse">

<path
d="M40 0H0V40"
fill="none"
stroke="#3B82F6"
stroke-opacity=".05"
stroke-width="1"/>

</pattern>

<filter id="blur">
<feGaussianBlur stdDeviation="80"/>
</filter>

<radialGradient id="glow1">

<stop offset="0%"
stop-color="#2563EB22"/>

<stop offset="100%"
stop-color="#2563EB00"/>

</radialGradient>

<radialGradient id="glow2">

<stop offset="0%"
stop-color="#60A5FA18"/>

<stop offset="100%"
stop-color="#60A5FA00"/>

</radialGradient>

</defs>

<!-- Background -->

<rect
width="1600"
height="900"
fill="url(#bg)"/>

<!-- Grid -->

<rect
width="1600"
height="900"
fill="url(#grid)"/>

<!-- Left Aurora -->

<circle
cx="250"
cy="220"
r="260"
fill="url(#glow1)"
filter="url(#blur)">

<animate
attributeName="cx"
values="250;340;250"
dur="18s"
repeatCount="indefinite"/>

</circle>

<!-- Right Aurora -->

<circle
cx="1380"
cy="640"
r="280"
fill="url(#glow2)"
filter="url(#blur)">

<animate
attributeName="cy"
values="640;560;640"
dur="20s"
repeatCount="indefinite"/>

</circle>

<!-- Top Accent -->

<circle
cx="820"
cy="-120"
r="260"
fill="#3B82F610"
filter="url(#blur)"/>

<!-- Bottom Accent -->

<circle
cx="780"
cy="1020"
r="260"
fill="#60A5FA10"
filter="url(#blur)"/>

<!-- Diagonal Lines -->

<g stroke="#3B82F6"
stroke-opacity=".05"
stroke-width="1">

<line x1="-100" y1="120" x2="500" y2="-480"/>
<line x1="180" y1="980" x2="900" y2="260"/>
<line x1="850" y1="980" x2="1600" y2="230"/>
<line x1="1120" y1="720" x2="1750" y2="90"/>

</g>

<!-- Floating Dots -->

<g fill="#60A5FA">

<circle cx="210" cy="160" r="2">
<animate attributeName="opacity"
values=".2;.8;.2"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="520" cy="430" r="2">
<animate attributeName="opacity"
values=".8;.2;.8"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="760" cy="260" r="2">
<animate attributeName="opacity"
values=".2;.8;.2"
dur="7s"
repeatCount="indefinite"/>
</circle>

<circle cx="1030" cy="620" r="2">
<animate attributeName="opacity"
values=".8;.2;.8"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="1360" cy="320" r="2">
<animate attributeName="opacity"
values=".2;.8;.2"
dur="6s"
repeatCount="indefinite"/>
</circle>

</g>

</svg>
