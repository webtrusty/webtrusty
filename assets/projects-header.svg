<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="180" viewBox="0 0 1600 180">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#091C3A"/>
</linearGradient>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#3B82F600"/>
<stop offset="50%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#3B82F600"/>
</linearGradient>

<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path
d="M40 0H0V40"
fill="none"
stroke="#1E3A8A"
stroke-opacity=".08"/>
</pattern>

</defs>

<!-- Background -->

<rect width="1600" height="180" rx="20" fill="url(#bg)"/>
<rect width="1600" height="180" fill="url(#grid)"/>

<!-- Animated Scan -->

<rect
x="-250"
y="0"
width="180"
height="180"
fill="#3B82F610"
transform="skewX(-25)">

<animate
attributeName="x"
values="-250;1750"
dur="8s"
repeatCount="indefinite"/>

</rect>

<!-- Top -->

<line
x1="120"
y1="45"
x2="1480"
y2="45"
stroke="url(#line)"
stroke-width="2"/>

<!-- Bottom -->

<line
x1="120"
y1="135"
x2="1480"
y2="135"
stroke="url(#line)"
stroke-width="2"/>

<!-- Left Browser -->

<rect
x="180"
y="62"
width="120"
height="56"
rx="10"
fill="#111827"
stroke="#2563EB"/>

<circle cx="198" cy="78" r="4" fill="#EF4444"/>
<circle cx="214" cy="78" r="4" fill="#F59E0B"/>
<circle cx="230" cy="78" r="4" fill="#22C55E"/>

<line
x1="195"
y1="98"
x2="280"
y2="98"
stroke="#60A5FA"
stroke-opacity=".6"/>

<!-- Right Browser -->

<rect
x="1300"
y="62"
width="120"
height="56"
rx="10"
fill="#111827"
stroke="#2563EB"/>

<circle cx="1318" cy="78" r="4" fill="#EF4444"/>
<circle cx="1334" cy="78" r="4" fill="#F59E0B"/>
<circle cx="1350" cy="78" r="4" fill="#22C55E"/>

<line
x1="1315"
y1="98"
x2="1400"
y2="98"
stroke="#60A5FA"
stroke-opacity=".6"/>

<!-- Connection -->

<line
x1="300"
y1="90"
x2="600"
y2="90"
stroke="#3B82F6"
stroke-opacity=".25"/>

<line
x1="1000"
y1="90"
x2="1300"
y2="90"
stroke="#3B82F6"
stroke-opacity=".25"/>

<!-- Pulse Nodes -->

<circle cx="600" cy="90" r="5" fill="#60A5FA">

<animate
attributeName="r"
values="5;8;5"
dur="2.4s"
repeatCount="indefinite"/>

</circle>

<circle cx="1000" cy="90" r="5" fill="#60A5FA">

<animate
attributeName="r"
values="5;8;5"
dur="2.8s"
repeatCount="indefinite"/>

</circle>

<!-- Title -->

<text
x="800"
y="82"
text-anchor="middle"
font-family="Arial"
font-size="38"
font-weight="700"
fill="white">

FEATURED PROJECTS

</text>

<!-- Subtitle -->

<text
x="800"
y="114"
text-anchor="middle"
font-family="Arial"
font-size="16"
fill="#60A5FA">

Selected Work • Premium Builds • Case Studies

</text>

</svg>
