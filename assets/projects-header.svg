<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="170" viewBox="0 0 1600 170">

<defs>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563EB00"/>
<stop offset="50%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#2563EB00"/>
</linearGradient>

<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#2563EB"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="20"/>
</filter>

</defs>

<!-- Background Glow -->

<circle cx="800" cy="82" r="90"
fill="#2563EB22"
filter="url(#blur)">

<animate
attributeName="r"
values="90;102;90"
dur="4s"
repeatCount="indefinite"/>

</circle>

<!-- Divider -->

<line
x1="120"
y1="82"
x2="620"
y2="82"
stroke="url(#line)"
stroke-width="2"/>

<line
x1="980"
y1="82"
x2="1480"
y2="82"
stroke="url(#line)"
stroke-width="2"/>

<!-- Animated Folder -->

<g>

<rect
x="775"
y="60"
width="50"
height="36"
rx="6"
fill="url(#accent)"/>

<rect
x="785"
y="50"
width="20"
height="10"
rx="3"
fill="#60A5FA"/>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -2;0 0"
dur="2.5s"
repeatCount="indefinite"/>

</g>

<!-- Orbit Ring -->

<circle
cx="800"
cy="78"
r="36"
fill="none"
stroke="#3B82F655"
stroke-width="1.5">

<animate
attributeName="r"
values="36;42;36"
dur="3s"
repeatCount="indefinite"/>

<animate
attributeName="stroke-opacity"
values=".5;.15;.5"
dur="3s"
repeatCount="indefinite"/>

</circle>

<!-- Label -->

<text
x="800"
y="38"
text-anchor="middle"
font-family="Inter,Arial"
font-size="15"
font-weight="700"
letter-spacing="6"
fill="#60A5FA">

PORTFOLIO

</text>

<!-- Title -->

<text
x="800"
y="132"
text-anchor="middle"
font-family="Inter,Arial"
font-size="42"
font-weight="800"
fill="#FFFFFF">

FEATURED PROJECTS

</text>

<!-- Scan -->

<rect
x="-220"
y="79"
width="170"
height="6"
fill="url(#accent)"
opacity=".18">

<animate
attributeName="x"
values="-220;1750"
dur="5s"
repeatCount="indefinite"/>

</rect>

<!-- Floating Dots -->

<circle cx="710" cy="42" r="2" fill="#60A5FA">
<animate attributeName="cy"
values="42;34;42"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="900" cy="118" r="2" fill="#60A5FA">
<animate attributeName="cy"
values="118;110;118"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="945" cy="50" r="2" fill="#3B82F6">
<animate attributeName="cy"
values="50;42;50"
dur="5s"
repeatCount="indefinite"/>
</circle>

</svg>
