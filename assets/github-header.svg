<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="180" viewBox="0 0 1600 180">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#081C3C"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F600"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F600"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40"
            fill="none"
            stroke="#1E3A8A"
            stroke-opacity=".08"/>
    </pattern>

  </defs>

  <!-- Background -->

  <rect width="1600" height="180" rx="20" fill="url(#bg)"/>
  <rect width="1600" height="180" fill="url(#grid)"/>

  <!-- Scan -->

  <rect
      x="-260"
      y="0"
      width="180"
      height="180"
      fill="#3B82F610"
      transform="skewX(-25)">

      <animate
          attributeName="x"
          values="-260;1750"
          dur="8s"
          repeatCount="indefinite"/>

  </rect>

  <!-- Top -->

  <line
      x1="120"
      y1="45"
      x2="1480"
      y2="45"
      stroke="url(#line)"
      stroke-width="2"/>

  <!-- Bottom -->

  <line
      x1="120"
      y1="135"
      x2="1480"
      y2="135"
      stroke="url(#line)"
      stroke-width="2"/>

  <!-- Contribution Graph -->

  <g transform="translate(170 60)">

    <rect x="0" y="0" width="10" height="10" rx="2" fill="#0F172A"/>
    <rect x="16" y="0" width="10" height="10" rx="2" fill="#1D4ED8"/>
    <rect x="32" y="0" width="10" height="10" rx="2" fill="#2563EB"/>
    <rect x="48" y="0" width="10" height="10" rx="2" fill="#3B82F6"/>
    <rect x="64" y="0" width="10" height="10" rx="2" fill="#60A5FA"/>

    <rect x="0" y="16" width="10" height="10" rx="2" fill="#2563EB"/>
    <rect x="16" y="16" width="10" height="10" rx="2" fill="#3B82F6"/>
    <rect x="32" y="16" width="10" height="10" rx="2" fill="#60A5FA"/>
    <rect x="48" y="16" width="10" height="10" rx="2" fill="#1D4ED8"/>
    <rect x="64" y="16" width="10" height="10" rx="2" fill="#2563EB"/>

    <rect x="0" y="32" width="10" height="10" rx="2" fill="#60A5FA"/>
    <rect x="16" y="32" width="10" height="10" rx="2" fill="#1D4ED8"/>
    <rect x="32" y="32" width="10" height="10" rx="2" fill="#3B82F6"/>
    <rect x="48" y="32" width="10" height="10" rx="2" fill="#2563EB"/>
    <rect x="64" y="32" width="10" height="10" rx="2" fill="#60A5FA"/>

  </g>

  <!-- Activity Bars -->

  <g transform="translate(1260 58)">

    <rect x="0" y="32" width="10" height="40" rx="3" fill="#2563EB"/>
    <rect x="20" y="12" width="10" height="60" rx="3" fill="#3B82F6"/>
    <rect x="40" y="22" width="10" height="50" rx="3" fill="#60A5FA"/>
    <rect x="60" y="0" width="10" height="72" rx="3" fill="#2563EB"/>
    <rect x="80" y="18" width="10" height="54" rx="3" fill="#3B82F6"/>

  </g>

  <!-- Pulse -->

  <circle cx="420" cy="90" r="5" fill="#60A5FA">

    <animate
      attributeName="r"
      values="5;8;5"
      dur="2.5s"
      repeatCount="indefinite"/>

  </circle>

  <circle cx="1180" cy="90" r="5" fill="#60A5FA">

    <animate
      attributeName="r"
      values="5;8;5"
      dur="2.8s"
      repeatCount="indefinite"/>

  </circle>

  <!-- Title -->

  <text
      x="800"
      y="82"
      text-anchor="middle"
      font-family="Arial"
      font-size="38"
      font-weight="700"
      fill="#FFFFFF">

      GITHUB ANALYTICS

  </text>

  <!-- Subtitle -->

  <text
      x="800"
      y="114"
      text-anchor="middle"
      font-family="Arial"
      font-size="16"
      fill="#60A5FA">

      Contributions • Repositories • Activity

  </text>

</svg>
