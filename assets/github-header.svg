<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="170" viewBox="0 0 1600 170">

<defs>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563EB00"/>
<stop offset="50%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#2563EB00"/>
</linearGradient>

<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#2563EB"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="20"/>
</filter>

</defs>

<!-- Glow -->

<circle
cx="800"
cy="82"
r="92"
fill="#2563EB22"
filter="url(#blur)">

<animate
attributeName="r"
values="92;105;92"
dur="4s"
repeatCount="indefinite"/>

</circle>

<!-- Divider -->

<line
x1="120"
y1="82"
x2="610"
y2="82"
stroke="url(#line)"
stroke-width="2"/>

<line
x1="990"
y1="82"
x2="1480"
y2="82"
stroke="url(#line)"
stroke-width="2"/>

<!-- GitHub Repository Icon -->

<g>

<rect
x="778"
y="58"
width="44"
height="48"
rx="6"
fill="url(#accent)"/>

<line
x1="789"
y1="72"
x2="811"
y2="72"
stroke="white"
stroke-width="2"/>

<line
x1="789"
y1="82"
x2="811"
y2="82"
stroke="white"
stroke-width="2"/>

<line
x1="789"
y1="92"
x2="806"
y2="92"
stroke="white"
stroke-width="2"/>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -3;0 0"
dur="2.5s"
repeatCount="indefinite"/>

</g>

<!-- Orbit -->

<circle
cx="800"
cy="82"
r="36"
fill="none"
stroke="#3B82F655"
stroke-width="1.5">

<animate
attributeName="r"
values="36;43;36"
dur="3s"
repeatCount="indefinite"/>

<animate
attributeName="stroke-opacity"
values=".5;.15;.5"
dur="3s"
repeatCount="indefinite"/>

</circle>

<!-- Label -->

<text
x="800"
y="40"
text-anchor="middle"
font-family="Inter,Arial"
font-size="15"
font-weight="700"
letter-spacing="6"
fill="#60A5FA">

OPEN SOURCE

</text>

<!-- Main Title -->

<text
x="800"
y="132"
text-anchor="middle"
font-family="Inter,Arial"
font-size="42"
font-weight="800"
fill="#FFFFFF">

GITHUB ACTIVITY

</text>

<!-- Scan Line -->

<rect
x="-220"
y="79"
width="180"
height="6"
fill="url(#accent)"
opacity=".18">

<animate
attributeName="x"
values="-220;1760"
dur="5s"
repeatCount="indefinite"/>

</rect>

<!-- Floating Particles -->

<circle cx="705" cy="44" r="2" fill="#60A5FA">
<animate attributeName="cy"
values="44;36;44"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="895" cy="118" r="2" fill="#60A5FA">
<animate attributeName="cy"
values="118;110;118"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="940" cy="55" r="2" fill="#3B82F6">
<animate attributeName="cy"
values="55;46;55"
dur="5s"
repeatCount="indefinite"/>
</circle>

</svg>
