<svg xmlns="http://www.w3.org/2000/svg"
width="1600"
height="700"
viewBox="0 0 1600 700">

<defs>

<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#050816">
<animate attributeName="stop-color"
values="#050816;#071224;#050816"
dur="12s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#091A36">
<animate attributeName="stop-color"
values="#091A36;#0D2045;#091A36"
dur="12s"
repeatCount="indefinite"/>
</stop>

</linearGradient>

<linearGradient id="border">

<stop offset="0%" stop-color="#2563EB"/>

<stop offset="100%" stop-color="#60A5FA"/>

</linearGradient>

<linearGradient id="scan">

<stop offset="0%" stop-color="#FFFFFF00"/>

<stop offset="50%" stop-color="#60A5FA22"/>

<stop offset="100%" stop-color="#FFFFFF00"/>

</linearGradient>

<filter id="blur">

<feGaussianBlur stdDeviation="70"/>

</filter>

<pattern
id="grid"
width="40"
height="40"
patternUnits="userSpaceOnUse">

<path
d="M40 0H0V40"
fill="none"
stroke="#1E3A8A"
stroke-opacity=".08"/>

</pattern>

</defs>

<!-- Background -->

<rect
width="1600"
height="700"
fill="url(#bg)"/>

<rect
width="1600"
height="700"
fill="url(#grid)"/>

<!-- Aurora -->

<circle
cx="220"
cy="140"
r="220"
fill="#2563EB22"
filter="url(#blur)">

<animate
attributeName="cx"
values="220;300;220"
dur="14s"
repeatCount="indefinite"/>

</circle>

<circle
cx="1380"
cy="580"
r="260"
fill="#60A5FA18"
filter="url(#blur)">

<animate
attributeName="cy"
values="580;520;580"
dur="16s"
repeatCount="indefinite"/>

</circle>

