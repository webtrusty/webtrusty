<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#0A1732"/>
</linearGradient>

<linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563EB"/>
<stop offset="100%" stop-color="#60A5FA"/>
</linearGradient>

<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40 0H0V40" fill="none" stroke="#1E3A8A" stroke-opacity=".08"/>
</pattern>

<linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FFFFFF00"/>
<stop offset="50%" stop-color="#60A5FA22"/>
<stop offset="100%" stop-color="#FFFFFF00"/>
</linearGradient>

</defs>

<!-- Card -->

<rect x="20" y="20" width="1560" height="480" rx="26"
fill="url(#bg)"
stroke="url(#border)"
stroke-width="2"/>

<rect x="20" y="20" width="1560" height="480" rx="26"
fill="url(#grid)"/>

<!-- Moving Scan -->

<rect
x="-300"
y="20"
width="220"
height="480"
fill="url(#scan)"
transform="skewX(-25)">

<animate
attributeName="x"
values="-300;1850"
dur="8s"
repeatCount="indefinite"/>

</rect>

