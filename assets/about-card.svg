<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="540" viewBox="0 0 1600 540">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#0B1730"/>
</linearGradient>

<linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563EB"/>
<stop offset="100%" stop-color="#60A5FA"/>
</linearGradient>

<pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
<path d="M32 0H0V32" fill="none" stroke="#1E3A8A" stroke-opacity=".08"/>
</pattern>

<linearGradient id="scan">
<stop offset="0%" stop-color="#FFFFFF00"/>
<stop offset="50%" stop-color="#60A5FA22"/>
<stop offset="100%" stop-color="#FFFFFF00"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="50"/>
</filter>

</defs>

<!-- Background -->

<rect width="1600" height="540" rx="26" fill="url(#bg)"/>

<rect width="1600" height="540" rx="26" fill="url(#grid)"/>

<!-- Glow -->

<circle cx="250" cy="120" r="170" fill="#2563EB22" filter="url(#blur)">
<animate attributeName="cx" values="250;320;250" dur="10s" repeatCount="indefinite"/>
</circle>

<circle cx="1380" cy="430" r="180" fill="#60A5FA18" filter="url(#blur)">
<animate attributeName="cy" values="430;390;430" dur="12s" repeatCount="indefinite"/>
</circle>

<!-- Border -->

<rect x="2" y="2" width="1596" height="536" rx="24"
fill="none"
stroke="url(#border)"
stroke-width="2"/>

<!-- Scan -->

<rect
x="-300"
y="0"
width="220"
height="540"
fill="url(#scan)"
transform="skewX(-25)">

<animate
attributeName="x"
values="-300;1800"
dur="8s"
repeatCount="indefinite"/>

</rect>

