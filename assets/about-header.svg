<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="170" viewBox="0 0 1600 170">

<defs>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563EB00"/>
<stop offset="50%" stop-color="#3B82F6"/>
<stop offset="100%" stop-color="#2563EB00"/>
</linearGradient>

<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#2563EB"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="18"/>
</filter>

</defs>

<!-- Glow -->

<circle cx="800" cy="82" r="85" fill="#2563EB22" filter="url(#blur)">

<animate
attributeName="r"
values="85;95;85"
dur="4s"
repeatCount="indefinite"/>

</circle>

<!-- Left Line -->

<line
x1="140"
y1="82"
x2="620"
y2="82"
stroke="url(#line)"
stroke-width="2"/>

<!-- Right Line -->

<line
x1="980"
y1="82"
x2="1460"
y2="82"
stroke="url(#line)"
stroke-width="2"/>

<!-- Center Diamond -->

<polygon
points="780,82 800,62 820,82 800,102"
fill="url(#accent)">

<animateTransform
attributeName="transform"
type="scale"
values="1;1.18;1"
dur="2.5s"
repeatCount="indefinite"
additive="sum"
origin="800 82"/>

</polygon>

<!-- ABOUT -->

<text
x="800"
y="74"
text-anchor="middle"
font-family="Inter,Arial"
font-size="16"
font-weight="700"
letter-spacing="6"
fill="#60A5FA">

SECTION

</text>

<text
x="800"
y="128"
text-anchor="middle"
font-family="Inter,Arial"
font-size="42"
font-weight="800"
fill="#FFFFFF">

ABOUT ME

</text>

<!-- Scan -->

<rect
x="-240"
y="79"
width="180"
height="6"
fill="url(#accent)"
opacity=".18">

<animate
attributeName="x"
values="-240;1700"
dur="6s"
repeatCount="indefinite"/>

</rect>

<!-- Small Particles -->

<circle cx="700" cy="42" r="2" fill="#60A5FA">
<animate attributeName="cy"
values="42;36;42"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="900" cy="122" r="2" fill="#60A5FA">
<animate attributeName="cy"
values="122;116;122"
dur="4s"
repeatCount="indefinite"/>
</circle>

</svg>
