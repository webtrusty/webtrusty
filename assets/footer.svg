<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#050814"/>
<stop offset="100%" stop-color="#09192f"/>
</linearGradient>

<linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563eb" stop-opacity="0"/>
<stop offset="50%" stop-color="#60a5fa"/>
<stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="45"/>
</filter>

</defs>

<rect width="1200" height="180" rx="18" fill="url(#bg)"/>

<circle cx="220" cy="90" r="100" fill="#2563eb" opacity=".15" filter="url(#blur)">
<animate attributeName="cx"
values="220;260;220"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="980" cy="90" r="90" fill="#3b82f6" opacity=".12" filter="url(#blur)">
<animate attributeName="cy"
values="90;70;90"
dur="7s"
repeatCount="indefinite"/>
</circle>

<line
x1="70"
y1="35"
x2="1130"
y2="35"
stroke="url(#glow)"
stroke-width="2"/>

<text
x="600"
y="82"
fill="white"
font-size="28"
font-family="Segoe UI"
font-weight="700"
text-anchor="middle">

Thanks For Visiting

<animate
attributeName="opacity"
values=".6;1;.6"
dur="4s"
repeatCount="indefinite"/>

</text>

<text
x="600"
y="114"
fill="#9dbdff"
font-size="15"
font-family="Segoe UI"
text-anchor="middle">

Designed & Developed by WebTrusty • Premium Frontend • Full-Stack • AI

</text>

<text
x="600"
y="145"
fill="#5f89d6"
font-size="13"
font-family="Segoe UI"
text-anchor="middle">

© 2026 WebTrusty • Built with Passion

</text>

</svg>
