<svg width="1600" height="260" viewBox="0 0 1600 260" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#08142C"/>
</linearGradient>

<linearGradient id="blue">
<stop offset="0%" stop-color="#2563EB"/>
<stop offset="100%" stop-color="#60A5FA"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="60"/>
</filter>

</defs>

<rect width="1600" height="260" fill="url(#bg)"/>

<!-- Glow -->

<circle cx="300" cy="120" r="150" fill="#2563EB22" filter="url(#blur)">
<animate attributeName="cx"
values="300;360;300"
dur="10s"
repeatCount="indefinite"/>
</circle>

<circle cx="1300" cy="160" r="180" fill="#60A5FA18" filter="url(#blur)">
<animate attributeName="cy"
values="160;120;160"
dur="12s"
repeatCount="indefinite"/>
</circle>

<!-- Divider -->

<line

x1="180"

y1="60"

x2="1420"

y2="60"

stroke="url(#blue)"

stroke-opacity=".35"

stroke-width="1"/>

<!-- Logo -->

<circle cx="800" cy="120" r="28"
fill="#0F172A"
stroke="#3B82F6"
stroke-width="2"/>

<text

x="800"

y="130"

text-anchor="middle"

font-family="Inter"

font-size="24"

font-weight="700"

fill="white">

W

</text>

<!-- Brand -->

<text

x="800"

y="178"

text-anchor="middle"

font-family="Inter"

font-size="28"

font-weight="700"

fill="white">

WEBTRUSTY

</text>

<text

x="800"

y="206"

text-anchor="middle"

font-family="Inter"

font-size="16"

fill="#94A3B8">

Crafting Premium Digital Experiences

</text>

<text

x="800"

y="236"

text-anchor="middle"

font-family="Inter"

font-size="13"

fill="#64748B">

© 2026 • Designed & Developed by WebTrusty

</text>

</svg>
