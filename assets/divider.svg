<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="80" viewBox="0 0 1600 80">

<defs>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#3B82F600"/>
<stop offset="50%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#3B82F600"/>
</linearGradient>

<linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FFFFFF00"/>
<stop offset="50%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#FFFFFF00"/>
</linearGradient>

</defs>

<!-- Main Divider -->

<line
x1="80"
y1="40"
x2="1520"
y2="40"
stroke="url(#line)"
stroke-width="2"/>

<!-- Animated Scan -->

<rect
x="-300"
y="37"
width="180"
height="6"
fill="url(#scan)"
opacity=".75">

<animate
attributeName="x"
values="-300;1720"
dur="5.5s"
repeatCount="indefinite"/>

</rect>

<!-- Left Diamond -->

<polygon
points="735,40 745,30 755,40 745,50"
fill="#2563EB">

<animateTransform
attributeName="transform"
type="scale"
values="1;1.25;1"
dur="2.6s"
repeatCount="indefinite"
additive="sum"
origin="745 40"/>

</polygon>

<!-- Center Diamond -->

<polygon
points="790,40 800,30 810,40 800,50"
fill="#60A5FA">

<animateTransform
attributeName="transform"
type="scale"
values="1;1.45;1"
dur="2s"
repeatCount="indefinite"
additive="sum"
origin="800 40"/>

<animate
attributeName="opacity"
values=".7;1;.7"
dur="2s"
repeatCount="indefinite"/>

</polygon>

<!-- Right Diamond -->

<polygon
points="845,40 855,30 865,40 855,50"
fill="#2563EB">

<animateTransform
attributeName="transform"
type="scale"
values="1;1.25;1"
dur="2.6s"
repeatCount="indefinite"
additive="sum"
origin="855 40"/>

</polygon>

<!-- Pulse Dots -->

<circle cx="670" cy="40" r="3" fill="#60A5FA">

<animate
attributeName="opacity"
values=".2;1;.2"
dur="2s"
repeatCount="indefinite"/>

</circle>

<circle cx="930" cy="40" r="3" fill="#60A5FA">

<animate
attributeName="opacity"
values="1;.2;1"
dur="2.4s"
repeatCount="indefinite"/>

</circle>

<!-- Flow Line -->

<line
x1="760"
y1="40"
x2="840"
y2="40"
stroke="#60A5FA"
stroke-opacity=".35">

<animate
attributeName="stroke-opacity"
values=".2;.8;.2"
dur="2.2s"
repeatCount="indefinite"/>

</line>

</svg>
