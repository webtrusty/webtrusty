<svg width="1600" height="60" viewBox="0 0 1600 60" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
<stop offset="50%" stop-color="#60A5FA"/>
<stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="4"/>
</filter>

</defs>

<!-- Glow -->

<line
x1="120"
y1="30"
x2="1480"
y2="30"
stroke="url(#line)"
stroke-width="2"
filter="url(#glow)"
opacity=".8"/>

<!-- Main -->

<line
x1="120"
y1="30"
x2="1480"
y2="30"
stroke="url(#line)"
stroke-width="1.5"/>

<!-- Center Diamond -->

<polygon
points="800,24 806,30 800,36 794,30"
fill="#60A5FA">

<animate
attributeName="opacity"
values=".3;1;.3"
dur="2.5s"
repeatCount="indefinite"/>

</polygon>

<!-- Left Dot -->

<circle cx="250" cy="30" r="2" fill="#60A5FA">
<animate attributeName="opacity"
values=".2;1;.2"
dur="3s"
repeatCount="indefinite"/>
</circle>

<!-- Right Dot -->

<circle cx="1350" cy="30" r="2" fill="#60A5FA">
<animate attributeName="opacity"
values="1;.2;1"
dur="3s"
repeatCount="indefinite"/>
</circle>

</svg>
