<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#050814"/>
<stop offset="100%" stop-color="#091a38"/>
</linearGradient>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563eb" stop-opacity="0"/>
<stop offset="50%" stop-color="#3b82f6"/>
<stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="50"/>
</filter>

</defs>

<rect width="1200" height="220" rx="18" fill="url(#bg)"/>

<circle cx="260" cy="120" r="120" fill="#2563eb" opacity=".15" filter="url(#blur)">
<animate attributeName="cx"
values="260;300;260"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="980" cy="90" r="110" fill="#60a5fa" opacity=".12" filter="url(#blur)">
<animate attributeName="cy"
values="90;120;90"
dur="8s"
repeatCount="indefinite"/>
</circle>

<line x1="80" y1="170" x2="1120" y2="170"
stroke="url(#line)"
stroke-width="1"/>

<text
x="80"
y="80"
fill="white"
font-size="34"
font-family="Segoe UI"
font-weight="700">

Let's Build Something Great

<animate
attributeName="opacity"
values="0.7;1;0.7"
dur="4s"
repeatCount="indefinite"/>

</text>

<text
x="80"
y="115"
fill="#9fb7ff"
font-size="17"
font-family="Segoe UI">

Available for freelance work, SaaS products, business websites and AI integrations.

</text>

<rect
x="890"
y="55"
width="220"
height="78"
rx="14"
fill="#081225"
stroke="#2563eb"
stroke-opacity=".45">

<animate
attributeName="stroke-opacity"
values=".25;.8;.25"
dur="3s"
repeatCount="indefinite"/>

</rect>

<text
x="920"
y="84"
fill="white"
font-size="18"
font-family="Segoe UI"
font-weight="600">

Get In Touch

</text>

<text
x="920"
y="112"
fill="#7da8ff"
font-size="14"
font-family="Segoe UI">

sahiblaskar003@gmail.com

</text>

</svg>
